name: Hello Workflow

# runs on a trigger
on:
  push:
    branches: [main]
    
  # these are jobs inside the workflow
jobs:

  # this is the name of the jobs
  greet:
    # this is github runner, each job runs on a runner
    runs-on: ubuntu-latest
    steps:
      - name: Check code
        uses: actions/checkout@v4

      - name: Print Hello message
        uses: actions/checkout@v4

      - name: Print Current Date and Time
        run: date

      - name: Print Branch name
        run: echo "Branch name is ${{ github.ref_name}}"

      - name: List Repository Files
        run: ls -la

      - name: Print Runner OS
        run: echo "Runner OS is $RUNNER_OS"

  # details:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: version of python, docker, etc
  #       run: docker --version && python --version
