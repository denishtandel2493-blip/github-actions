name: Hello Workflow

# runs on a trigger
on:
  push:
    branches: [main]
    
  # these are jobs inside the workflow
jobs:

  # this is the name of the jobs
  greet:
    # this is github runner, each job runs on a runner
    runs-on: ubuntu-latest
    steps:
      - name: Check code
        uses: actions/checkout@v4

      - name: Print message
        uses: actions/checkout@v4

