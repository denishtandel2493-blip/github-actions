name: Environment Variable Demo

on:
  push:

env:
  APP_NAME: myapp

jobs:
  show-vars:
    runs-on: ubuntu-latest

    env:
      ENVIROMENT: staging

    steps:
      - name: Print Environment Variables
        env:
          VERSION: 1.0.0
        run: |
          echo "App Name: $APP_NAME"
          echo "Enviroment: $ENVIRONMENT"
          echo "Version: $VERSION"