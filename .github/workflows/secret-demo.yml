name: Secret Demo

on:
    push:

jobs:
    check-secret:
        runs-on: ubuntu-latest

        steps:
            - name: Check if Secret Exists
              env:
                MY_SECRET: ${{ secrets.MY_SECRET_MESSAGE }}
              run: |
                if [ -n "$MY_SECRET" ]; then
                  echo "The secret is set: true"
                else
                  echo "The secret is set: false"
                fi
            