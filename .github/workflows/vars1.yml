name: Job Outputs Example

on:
  push:

jobs:
  set-date:
    runs-on: ubuntu-latest

    outputs:
      today: ${{ steps.get-date.outputs.today }}

    steps:
      - name: Get Today's Date
        id: get-date
        run: echo "today=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

  print-date:
    runs-on: ubuntu-latest
    needs: set-date

    steps:
      - name: Print Date
        run: echo "Today's date is ${{ needs.set-date.outputs.today }}"